<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0d14" />
<meta name="description" content="StudyOS — modulare Lernplattform für Uni-Module. Hefteinträge, Quiz, Full-Content-Modus." />
<title>StudyOS · Lernplattform</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="./styles.css" />

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2374d7ff'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-family='system-ui' font-weight='900' font-size='18' fill='%23081018'%3ES%3C/text%3E%3C/svg%3E" />
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     SVG ICON SPRITE — Lucide-inspired line icons
     ═══════════════════════════════════════════════════════════════ -->
<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <defs>
    <symbol id="i-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9.5 12 3l9 6.5V20a2 2 0 0 1-2 2h-4v-7h-6v7H5a2 2 0 0 1-2-2Z"/>
    </symbol>
    <symbol id="i-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v17H6.5A2.5 2.5 0 0 0 4 21.5z"/><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
    </symbol>
    <symbol id="i-brain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5a3 3 0 0 0-3-3 3 3 0 0 0-3 3v.5a3 3 0 0 0-3 3 3 3 0 0 0 1 2.24V12a3 3 0 0 0 0 5 3 3 0 0 0 3 3 3 3 0 0 0 3-3V5Z"/><path d="M12 5a3 3 0 0 1 3-3 3 3 0 0 1 3 3v.5a3 3 0 0 1 3 3 3 3 0 0 1-1 2.24V12a3 3 0 0 1 0 5 3 3 0 0 1-3 3 3 3 0 0 1-3-3V5Z"/>
    </symbol>
    <symbol id="i-chart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 3v18h18"/><path d="M7 14 11 9l3 3 5-7"/>
    </symbol>
    <symbol id="i-target" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/>
    </symbol>
    <symbol id="i-sparkle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.5 5.5l2.8 2.8M15.7 15.7l2.8 2.8M5.5 18.5l2.8-2.8M15.7 8.3l2.8-2.8"/>
    </symbol>
    <symbol id="i-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
    </symbol>
    <symbol id="i-arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </symbol>
    <symbol id="i-arrow-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </symbol>
    <symbol id="i-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="m9 6 6 6-6 6"/>
    </symbol>
    <symbol id="i-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 6 6 18M6 6l12 12"/>
    </symbol>
    <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="m5 12 5 5L20 7"/>
    </symbol>
    <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12h14"/>
    </symbol>
    <symbol id="i-printer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 9V3h12v6M6 18H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="7" rx="1"/>
    </symbol>
    <symbol id="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>
    </symbol>
    <symbol id="i-bookmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 3h14v18l-7-4-7 4Z"/>
    </symbol>
    <symbol id="i-layers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="m12 2 10 5-10 5L2 7z"/><path d="m2 12 10 5 10-5"/><path d="m2 17 10 5 10-5"/>
    </symbol>
    <symbol id="i-zap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13 2 3 14h7l-1 8 10-12h-7z"/>
    </symbol>
    <symbol id="i-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 6h16M4 12h16M4 18h16"/>
    </symbol>
    <symbol id="i-more" viewBox="0 0 24 24" fill="currentColor">
      <circle cx="5" cy="12" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="19" cy="12" r="1.7"/>
    </symbol>
    <symbol id="i-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
    </symbol>
    <symbol id="i-flame" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2s3 4 3 8a3 3 0 0 1-6 0c0-1 .5-2 1-2.5-2 2-4 4.5-4 7a6 6 0 0 0 12 0c0-5-6-9-6-12.5Z"/>
    </symbol>
    <symbol id="i-external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 3h7v7M10 14 21 3M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/>
    </symbol>
    <symbol id="i-function" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 20c-.5 0-3 0-3-3V10c0-3 2.5-3 3-3"/><path d="M16 4c.5 0 3 0 3 3v7c0 3-2.5 3-3 3"/><path d="M9 12h6"/>

  </defs>
</svg>

<!-- ═══════════════════════════════════════════════════════════════
     APP SHELL
     ═══════════════════════════════════════════════════════════════ -->
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" data-sidebar>
    <div class="brand">
      <div class="brand__logo" aria-hidden="true">
        <span class="brand__logo-mark">S</span>
      </div>
      <div class="brand__text">
        <h1 class="brand__name">StudyOS</h1>
        <p class="brand__tagline">Lernplattform</p>
      </div>
    </div>

    <nav class="nav" aria-label="Hauptnavigation">
      <div class="nav__group-label">App</div>
      <a class="nav__item" href="#/" data-nav="home">
        <svg class="nav__icon"><use href="#i-home"/></svg>
        <span>Startseite</span>
      </a>
      <a class="nav__item" href="#/modules" data-nav="modules">
        <svg class="nav__icon"><use href="#i-layers"/></svg>
        <span>Module</span>
        <span class="nav__pill" data-count="modules">0</span>
      </a>
      <a class="nav__item" href="#/learn" data-nav="learn">
        <svg class="nav__icon"><use href="#i-brain"/></svg>
        <span>Lernbereich</span>
      </a>
      <a class="nav__item" href="#/progress" data-nav="progress">
        <svg class="nav__icon"><use href="#i-chart"/></svg>
        <span>Fortschritt</span>
      </a>

      <div class="nav__group-label">Module</div>
      <div class="nav__modules" data-nav-modules>
        <!-- gefüllt durch Renderer -->
      </div>

      <button class="nav__item nav__item--disabled" disabled>
        <svg class="nav__icon"><use href="#i-plus"/></svg>
        <span>Neues Modul</span>
      </button>
    </nav>

    <div class="sidebar__footer">
      <div class="streak" data-streak>
        <svg class="streak__icon"><use href="#i-flame"/></svg>
        <div>
          <div class="streak__label">Lernstreak</div>
          <div class="streak__value"><span data-streak-days>0</span> Tage</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- TOPBAR -->
    <header class="topbar">
      <button class="topbar__menu" data-menu-toggle aria-label="Menü">
        <svg><use href="#i-menu"/></svg>
      </button>

      <nav class="breadcrumb" data-breadcrumb aria-label="Breadcrumb">
        <!-- dynamisch -->
      </nav>

      <div class="search" data-search>
        <svg class="search__icon"><use href="#i-search"/></svg>
        <input
          class="search__input"
          type="text"
          placeholder="Suche Module, Themen, Formeln …"
          data-search-input
          aria-label="Suche"
        />
        <kbd class="search__kbd">⌘K</kbd>
      </div>

      <div class="topbar__actions">
        <button class="icon-btn" data-action="print" title="Drucken / PDF">
          <svg><use href="#i-printer"/></svg>
        </button>
        <button class="icon-btn" data-action="theme" title="Theme wechseln">
          <svg><use href="#i-moon"/></svg>
        </button>
        <button class="icon-btn icon-btn--accent" data-action="focus" title="Fokus-Modus">
          <svg><use href="#i-zap"/></svg>
        </button>
      </div>
    </header>

    <!-- VIEW MOUNT — alle Views werden hier gerendert -->
    <div id="view-mount" class="view-mount" aria-live="polite">
      <!-- Skeleton während JS lädt -->
      <div class="skeleton">
        <div class="skeleton__bar skeleton__bar--lg"></div>
        <div class="skeleton__grid">
          <div class="skeleton__card"></div>
          <div class="skeleton__card"></div>
          <div class="skeleton__card"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     COMMAND PALETTE (⌘K)
     ═══════════════════════════════════════════════════════════════ -->
<div class="command-palette" id="command-palette" data-cmd role="dialog" aria-modal="true" aria-label="Befehlspalette" hidden>
  <div class="command-palette__backdrop" data-cmd-close></div>
  <div class="command-palette__panel">
    <div class="command-palette__input-wrap">
      <svg class="command-palette__icon"><use href="#i-search"/></svg>
      <input type="text" class="command-palette__input" data-cmd-input placeholder="Suche oder springe zu …" />
      <kbd class="search__kbd">ESC</kbd>
    </div>
    <div class="command-palette__list" data-cmd-list role="listbox"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     FULL CONTENT OVERLAY (Einzelner Hefteintrag Modal)
     ═══════════════════════════════════════════════════════════════ -->
<div class="full-overlay" id="full-overlay" data-full role="dialog" aria-modal="true" aria-label="Hefteintrag" hidden>
  <div class="full-overlay__backdrop" data-full-close></div>
  <article class="full-overlay__sheet">
    <header class="full-overlay__head">
      <div class="full-overlay__meta">
        <div class="full-overlay__eyebrow" data-full-eyebrow>Hefteintrag</div>
        <h2 class="full-overlay__title" data-full-title>Titel</h2>
      </div>
      <div class="full-overlay__actions">
        <button class="icon-btn" data-action="print" title="Drucken">
          <svg><use href="#i-printer"/></svg>
        </button>
        <button class="icon-btn" data-full-close title="Schließen">
          <svg><use href="#i-x"/></svg>
        </button>
      </div>
    </header>
    <div class="full-overlay__body" data-full-body></div>
  </article>
</div>

<!-- NOSCRIPT FALLBACK -->
<noscript>
  <div style="padding:40px;font-family:system-ui;max-width:640px;margin:10vh auto;background:#141b2b;color:#edf2ff;border-radius:20px">
    <h1>StudyOS benötigt JavaScript</h1>
    <p>Diese App rendert alle Inhalte dynamisch. Bitte aktiviere JavaScript, um StudyOS zu verwenden.</p>
  </div>
</noscript>

<script src="data/_registry.js"></script>
<script src="data/risk.js"></script>
<script src="data/asset-management.js"></script>
<script src="data/behavioral-finance.js"></script>
<script src="data/hr.js"></script>
<script src="core.js"></script>
</body>
</html>
